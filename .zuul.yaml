- project:
    queue: freezer
    templates:
      - check-requirements
      - publish-openstack-docs-pti
      - release-notes-jobs-python3
      - openstack-python3-jobs
    check:
      jobs:
        - openstack-tox-pylint
        - freezer-tempest-agent
        - freezer-tempest-scheduler
        - freezer-tempest-ipv6-only
        - freezer-ubuntu
        - freezer-centos-10-stream
    gate:
      jobs:
        - openstack-tox-pylint
        - freezer-tempest-agent
        - freezer-tempest-scheduler
        - freezer-tempest-ipv6-only
        - freezer-ubuntu
        - freezer-centos-10-stream

- job:
    name: freezer-base
    parent: freezer-tempest-basic
    vars:
      tempest_test_regex: '^(freezer_tempest_plugin.tests.freezer)'

- job:
    name: freezer-ubuntu
    parent: freezer-base

- job:
    name: freezer-centos-10-stream
    parent: freezer-base
    nodeset: devstack-single-node-centos-10-stream
